name: RunLog CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-server:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./server
    
    services:
      mongodb:
        image: mongo:latest
        ports:
          - 27017:27017
      redis:
        image: redis:latest
        ports:
          - 6379:6379

    steps:
    - uses: actions/checkout@v3
    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20.19.0'
        cache: 'npm'
        cache-dependency-path: ./server/package-lock.json
    
    - name: Install Dependencies
      run: npm ci

    # Optional: If there are unit tests configured in package.json, uncomment below
    # - name: Run Tests
    #   run: npm test
    #   env:
    #     MONGODB_URI: mongodb://localhost:27017/runlog_test
    #     REDIS_URL: redis://localhost:6379
    #     JWT_SECRET: test_secret

  build-client:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./client

    steps:
    - uses: actions/checkout@v3
    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20.19.0'
        cache: 'npm'
        cache-dependency-path: ./client/package-lock.json

    - name: Install Dependencies
      run: npm ci

    - name: Build React App
      run: npm run build
      env:
        NODE_ENV: production
