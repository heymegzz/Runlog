name: RunLog CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'

      - name: Install & verify server
        working-directory: server
        run: npm ci

      - name: Install & build client
        working-directory: client
        run: |
          npm install --no-audit --no-fund
          npm run build
        env:
          NODE_ENV: production
          VITE_API_URL: https://runlog-1.onrender.com/api
